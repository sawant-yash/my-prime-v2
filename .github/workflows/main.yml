name: Amazon Prime Clone CI-CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java (for Maven build)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # 3. Build WAR file
      - name: Build WAR
        run: mvn clean package -DskipTests

      # 4. Login to DockerHub
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:2.0.0 .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:2.0.0 \
                     ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:latest

      # 6. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:2.0.0
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:latest

      # 7. Stop & remove old container
      - name: Stop Existing Container
        run: |
          docker stop prime-app || true
          docker rm prime-app || true

      # 8. Pull latest image
      - name: Pull Latest Image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:latest

      # 9. Run container on EC2
      - name: Run Container
        run: |
          docker run -d \
            --name prime-app \
            -p 8080:8080 \
            --restart always \
            ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:latest

     
