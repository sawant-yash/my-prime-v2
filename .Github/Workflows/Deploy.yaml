name: Java WAR CI/CD (Tomcat Deploy)

on:
  workflow_dispatch:
  
jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v5

      # 2. Setup Java (required for Maven build)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # 3. Build WAR file using Maven
      - name: Build WAR
        run: mvn clean package

      # 4. Login to Docker Hub
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build Docker image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest .

      # 6. Push Docker image
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest

      # 7. Stop old container
      - name: Stop old container
        run: |
          docker stop myapp || true
          docker rm myapp || true

      # 8. Remove old image (optional cleanup)
      - name: Clean old image
        run: docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest || true

      # 9. Pull latest image from Docker Hub
      - name: Pull image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest

      # 10. Run new container (Tomcat WAR deployment)
      - name: Run container
        run: |
          docker run -d \
          -p 8080:8080 \
          --name myapp \
          --restart unless-stopped \
          ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
