name: Amazon Prime Clone CI-CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to DockerHub
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:2.0.0 .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:2.0.0 \
                     ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:latest

      # 5. Push Docker Image to DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:2.0.0
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:latest

      # 6. Stop and remove old container (if running)
      - name: Stop Existing Container
        run: |
          docker stop prime-app || true
          docker rm prime-app || true 

      # 7. Pull latest image from DockerHub
      - name: Pull Latest Image
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:latest

      # 8. Run new container (Deploy on EC2)
      - name: Run Container
        run: |
          docker run -d \
            --name prime-app \
            -p 8080:8080 \
            ${{ secrets.DOCKERHUB_USERNAME }}/amazon-prime-clone:latest

      # 9. Verify container is running
      - name: Check Running Containers
        run: docker ps
